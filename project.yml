name: StorminShaneWeather
options:
  bundleIdPrefix: com.storminshane
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
targets:
  StorminShaneWeather:
    type: application
    platform: iOS
    sources:
      - StorminShaneWeather
    resources:
      - StorminShaneWeather/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.storminshane.weather
        INFOPLIST_FILE: StorminShaneWeather/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    info:
      path: StorminShaneWeather/Resources/Info.plist
      properties:
        CFBundleDisplayName: Stormin' Shane
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: Stormin' Shane uses your location to show hyperlocal forecasts, radar, and severe weather alerts.
        NSCameraUsageDescription: Creator Mode uses the camera to record Shane's weather updates.
        NSMicrophoneUsageDescription: Creator Mode uses the microphone while recording weather updates.
        NSPhotoLibraryUsageDescription: Creator Mode can upload weather videos from the photo library.
        UIBackgroundModes:
          - remote-notification
