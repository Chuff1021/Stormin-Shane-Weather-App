<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Stormin' Shane Weather App</title>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif; }
  #root { height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="home-screen.jsx"></script>
<script type="text/babel" src="radar-screen.jsx"></script>
<script type="text/babel" src="tornado-screen.jsx"></script>
<script type="text/babel" src="dashboard-screen.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "weatherState": "clear",
  "darkMode": true,
  "accent": "cyan",
  "palette": "nws",
  "creatorMode": true,
  "density": "regular"
}/*EDITMODE-END*/;

function Frame({ children }) {
  return (
    <IOSDevice width={390} height={844} dark={true}>
      <div style={{ position: 'absolute', inset: 0 }}>
        {children}
      </div>
    </IOSDevice>
  );
}

function ScreenWithTabs({ active, theme, accent, dark, children }) {
  const [tab, setTab] = React.useState(active);
  return (
    <>
      {children(tab)}
      <TabBar active={tab} onChange={setTab} accent={accent} dark={dark} />
    </>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const accent = ACCENTS[t.accent].hi;
  const theme = t.weatherState;
  const dark = t.darkMode;

  return (
    <>
      <DesignCanvas>
        <DCSection id="overview" title="Stormin' Shane · Phase 1 MVP" subtitle="Republic, MO — toggle the weather state in Tweaks to see the app shift mood">
          <DCArtboard id="home" label="Home · Current Conditions" width={390} height={844}>
            <Frame>
              <ScreenWithTabs active="home" theme={theme} accent={accent} dark={dark}>
                {() => <HomeScreen theme={theme} accent={accent} dark={dark} density={t.density} />}
              </ScreenWithTabs>
            </Frame>
          </DCArtboard>

          <DCArtboard id="radar" label="Radar · Interactive map" width={390} height={844}>
            <Frame>
              <ScreenWithTabs active="radar" theme={theme} accent={accent} dark={dark}>
                {() => <RadarScreen theme={theme} accent={accent} palette={t.palette} />}
              </ScreenWithTabs>
            </Frame>
          </DCArtboard>

          <DCArtboard id="tornado" label="Tornado Tracker · Flagship" width={390} height={844}>
            <Frame>
              <ScreenWithTabs active="tornado" theme={theme} accent={accent} dark={dark}>
                {() => <TornadoScreen accent={ACCENTS.amber.hi} />}
              </ScreenWithTabs>
            </Frame>
          </DCArtboard>

          <DCArtboard id="feed" label="Shane's Public Feed" width={390} height={844}>
            <Frame>
              <ScreenWithTabs active="feed" theme={theme} accent={accent} dark={dark}>
                {() => <PublicFeed accent={accent} />}
              </ScreenWithTabs>
            </Frame>
          </DCArtboard>

          <DCArtboard id="locations" label="Saved Locations" width={390} height={844}>
            <Frame>
              <ScreenWithTabs active="locations" theme={theme} accent={accent} dark={dark}>
                {() => <LocationsScreen accent={accent} />}
              </ScreenWithTabs>
            </Frame>
          </DCArtboard>

          <DCArtboard id="alerts" label="Alerts & Notifications" width={390} height={844}>
            <Frame>
              <ScreenWithTabs active="home" theme={theme} accent={accent} dark={dark}>
                {() => <AlertsScreen accent={accent} />}
              </ScreenWithTabs>
            </Frame>
          </DCArtboard>
        </DCSection>

        {t.creatorMode && (
          <DCSection id="creator" title="Shane's Creator Mode" subtitle="Behind Face ID — the differentiator">
            <DCArtboard id="studio" label="Studio Dashboard" width={390} height={844}>
              <Frame>
                <ScreenWithTabs active="feed" theme={theme} accent={accent} dark={dark}>
                  {() => <CreatorDashboard accent={accent} />}
                </ScreenWithTabs>
              </Frame>
            </DCArtboard>
          </DCSection>
        )}

        <DCPostIt top={20} left={40} rotate={-3} width={220}>
          Toggle <b>Weather State</b> in Tweaks → watch the entire app respond. Tornado mode is the flagship moment.
        </DCPostIt>
      </DesignCanvas>

      <TweaksPanel title="Stormin' Shane">
        <TweakSection label="Weather State" />
        <TweakRadio label="Conditions" value={t.weatherState}
          options={[
            {value:'clear', label:'Clear'},
            {value:'storm', label:'Storm'},
            {value:'tornado', label:'Tornado'},
            {value:'night', label:'Night'},
          ]}
          onChange={(v) => setTweak('weatherState', v)} />

        <TweakSection label="Theme" />
        <TweakToggle label="Dark mode" value={t.darkMode} onChange={(v) => setTweak('darkMode', v)} />
        <TweakRadio label="Accent" value={t.accent}
          options={[
            {value:'cyan', label:'Cyan'},
            {value:'amber', label:'Amber'},
            {value:'magenta', label:'Magenta'},
          ]}
          onChange={(v) => setTweak('accent', v)} />

        <TweakSection label="Radar" />
        <TweakRadio label="Palette" value={t.palette}
          options={[
            {value:'nws', label:'NWS Std'},
            {value:'cb', label:'CB-Safe'},
          ]}
          onChange={(v) => setTweak('palette', v)} />

        <TweakSection label="App" />
        <TweakToggle label="Creator mode" value={t.creatorMode} onChange={(v) => setTweak('creatorMode', v)} />
        <TweakRadio label="Density" value={t.density}
          options={[
            {value:'compact', label:'Compact'},
            {value:'regular', label:'Regular'},
          ]}
          onChange={(v) => setTweak('density', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
